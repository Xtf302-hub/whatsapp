# Google Cloud Build configuration for automatic deployments
# Triggered on push to main branch

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/whatsapp-matrix-bridge:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/whatsapp-matrix-bridge:latest'
      - '-f'
      - 'Dockerfile.cloudrun'
      - '.'
    id: 'build-image'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/whatsapp-matrix-bridge:$SHORT_SHA'
    id: 'push-image'
    waitFor: ['build-image']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    args:
      - 'run'
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/whatsapp-matrix-bridge:$SHORT_SHA'
      - '--location=us-central1'
      - '--cluster=cloud-run'
    id: 'deploy-cloudrun'
    waitFor: ['push-image']

# Alternative simpler Cloud Run deploy (recommended)
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'whatsapp-matrix-bridge'
      - '--image'
      - 'gcr.io/$PROJECT_ID/whatsapp-matrix-bridge:$SHORT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--timeout'
      - '3600'
      - '--set-env-vars'
      - 'LOG_LEVEL=INFO,PORT=8080'

images:
  - 'gcr.io/$PROJECT_ID/whatsapp-matrix-bridge:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/whatsapp-matrix-bridge:latest'

options:
  machineType: 'N1_HIGHCPU_8'

timeout: '1800s'
